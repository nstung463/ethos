services:
  ethos-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ethos-backend
    ports:
      - "8080:8080"
    environment:
      ETHOS_PROVIDER: ${ETHOS_PROVIDER:-openrouter}
      ETHOS_MODEL: ${ETHOS_MODEL:-openai/gpt-4o-mini}
      ETHOS_WORKSPACE: /app/workspace
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPEN_TERMINAL_URL: ${OPEN_TERMINAL_URL:-}
      OPEN_TERMINAL_API_KEY: ${OPEN_TERMINAL_API_KEY:-}
      OPEN_TERMINAL_USER_ID: ${OPEN_TERMINAL_USER_ID:-}
      DAYTONA_API_KEY: ${DAYTONA_API_KEY:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/models')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - ethos-network

  ethos-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    container_name: ethos-frontend
    depends_on:
      ethos-backend:
        condition: service_healthy
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - ethos-network

networks:
  ethos-network:
    driver: bridge
